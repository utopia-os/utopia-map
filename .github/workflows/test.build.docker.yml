name: "test:build test docker"

on: push

jobs:
  files-changed:
    name: Detect File Changes - build - docker
    runs-on: ubuntu-latest
    outputs:
      changes: ${{ steps.filter.outputs.build-docker }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.1.7
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            build-docker:
              - '.github/workflows/*'
              - '**/*'
  
  build-production:
    if: needs.files-changed.outputs.changes == 'true'
    name: Build Docker Production
    needs: files-changed
    runs-on: ubuntu-latest
    env:
      WORKING_DIRECTORY: ./
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.1.7

      - name: Build Docker Production
        run: docker compose -f docker-compose.yml build
        working-directory: ${{env.WORKING_DIRECTORY}}

